<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REEM - Magnetismo Femenino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #D35400;
            --secondary-orange: #E67E22;
            --bg-texture: #BA4A00;
            --text-light: #FFF5E1;
            --accent-gold: #F1C40F;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: var(--bg-texture);
            font-family: 'Outfit', sans-serif;
            color: var(--text-light);
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            /* High-impact orange gradient with noise simulation */
            background: 
                radial-gradient(circle at 30% 50%, var(--secondary-orange), var(--primary-orange) 70%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        /* Ambient Glows for Depth */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.4;
            z-index: 1;
        }

        .glow-warm {
            top: -200px;
            left: -100px;
            background: #FF8C00;
        }

        /* Content Layout */
        .content {
            flex: 1.2;
            padding: 0 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
            position: relative;
            text-align: center;
        }

        .image-side {
            flex: 0.8;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* Image Refinement */
        .ara-photo {
            height: 115%;
            width: auto;
            object-fit: cover;
            /* Sharper mask for "removed background" feel */
            mask-image: linear-gradient(to left, 
                rgba(0,0,0,1) 50%, 
                rgba(0,0,0,0.8) 70%, 
                rgba(0,0,0,0) 95%);
            -webkit-mask-image: linear-gradient(to left, 
                rgba(0,0,0,1) 50%, 
                rgba(0,0,0,0.8) 70%, 
                rgba(0,0,0,0) 95%);
            
            /* Professional Color Correction */
            filter: 
                contrast(1.2) 
                brightness(1.1) 
                saturate(1.25) 
                drop-shadow(-20px 0 50px rgba(0,0,0,0.3));
            
            image-rendering: -webkit-optimize-contrast;
            position: relative;
            left: 20px; /* Shift for better framing */
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            /* Subtle blend on the left edge only */
            background: linear-gradient(90deg, var(--bg-texture) 20%, transparent 100%);
            z-index: 6;
        }

        /* Typography */
        .episode-tag {
            font-size: 28px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            opacity: 0.9;
            color: var(--text-light);
        }

        h1 {
            font-size: 110px;
            line-height: 0.85;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: -2px;
            text-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 .alt-font {
            display: block;
            font-size: 120px;
            color: var(--text-light);
            margin-top: 10px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 60px;
            text-transform: uppercase;
            background: var(--glass);
            padding: 10px 20px;
            display: inline-block;
            border-radius: 4px;
        }

        /* Signature Style */
        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 72px;
            color: var(--text-light);
            margin-top: 20px;
            transform: rotate(-5deg);
        }

        /* Circles and Accents */
        .decorative-element {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 2;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="glow glow-warm"></div>
        <div class="decorative-element circle-1"></div>
        
        <div class="content">
            <div class="episode-tag">Episodio 01</div>
            <h1>
                MAGNETISMO<br>
                <span class="alt-font">FEMENINO</span>
            </h1>
            <div class="subtitle">El viaje hacia tu verdadera esencia</div>
            
            <div class="signature">By Ara</div>
        </div>

        <div class="image-side">
            <div class="image-overlay"></div>
            <!-- Using Ara foto 2 for the close-up as requested for better face focus -->
            <img src="assets/ara foto 2.jpeg" alt="Araceli" class="ara-photo">
        </div>
    </div>
</body>
</html>
